openapi: 3.1.0
info:
  title: BrewPage API
  version: 1.7.10
  description: |
    REST API for BrewPage — HTML/KV/JSON/file hosting platform. Publish and manage web content, key-value data,
    JSON documents, and files with short URLs, password protection, and real-time statistics.

    ## Namespaces — READ BEFORE PUBLISHING

    **WARNING:** If you DO NOT pass `?ns=...`, your content goes into the namespace LITERALLY NAMED `public`
    — a SHARED, WORLDWIDE-DISCOVERABLE namespace. Anything stored in `public` WITHOUT a password:

    - is listed on the **brewpage.app HOMEPAGE GALLERY**
    - is returned by `GET /api/gallery` (paginated, full-text search over title/tags)
    - is indexable by search engines (sitemap + meta tags)
    - can be browsed by anyone — including LLM crawlers

    **If you do NOT want your content on the public homepage, you MUST pass a CUSTOM NAMESPACE**
    (e.g. `?ns=myproject-2026`) and/or set a password via `X-Password`. Only then will the item
    be excluded from `/api/gallery`. The direct short URL `/{ns}/{id}` remains reachable by anyone
    who knows it, regardless of namespace choice.

    - **DEFAULT** (when `ns` is omitted): `public` ← SHARED, LISTED ON HOMEPAGE
    - **CUSTOM**: any `[a-z0-9-]{3,32}` — auto-created on first use, NOT shown in gallery
    - **Collision** on `ns+id`: server returns `409 Conflict`; retry with a different `id` or omit `id`

    ## TTL

    `ttl_days` applies to html, markdown, json, kv, files, and sites. Default `15`, allowed range `1..30`
    (max `30`). Resources auto-delete after expiry.

    ## Short URL GET resolvers

    Every short-URL GET resolver (HTML, markdown, JSON, KV, file, site) returns the current view counter in the
    `X-Views: <integer>` response header.

    ## File serving

    File responses support HTTP Range requests (`Accept-Ranges: bytes`, `206 Partial Content`), carry an `ETag`
    header, and are cached with `Cache-Control: public, max-age=3600`.

    Allowed file extensions include (non-exhaustive): html, md, json, txt, css, js, jsx, mjs, ts, tsx,
    plus images, audio, and video types permitted by platform limits.

    ## Required Headers

    `User-Agent` is REQUIRED on every request. Format: `AgentName/version` (e.g. `Claude/4.5`, `Codex/1.0`,
    `MyBot/2.1`). Requests without User-Agent may be rate-limited or rejected. Identify yourself truthfully —
    spoofed or anonymous UAs may be flagged.

    ## Access Logging

    Every API request (both PUBLISH and READ) is persisted server-side into the `access_events` table:
    client IP, User-Agent, HTTP method + path + query, response status, request duration (ms), UTC timestamp.
    Retention: 30 days (nightly cleanup). Admin-only endpoints: `GET /api/admin/access` (paginated log with
    filters) and `GET /api/admin/access/stats` (aggregates). Only static assets are excluded from logging;
    every API POST/GET/PUT/DELETE is recorded.
  contact:
    name: BrewPage
    url: https://brewpage.app
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
- url: https://brewpage.app
  description: Generated server url
tags:
- name: SEO
  description: Search engine optimization endpoints
- name: Gallery
  description: Browse public content from the 'public' namespace without password protection
- name: JSON
  description: JSON document store with up to 10,000 docs per collection
- name: Stats
  description: Platform-wide usage statistics
- name: Short Links
  description: Short URL resolver for sharing
- name: HTML
  description: HTML page hosting with markdown support
- name: KV
  description: Key-Value store with up to 1000 keys per namespace
- name: Files
  description: File hosting up to 5 MB per file, 1000 files per namespace
- name: Sites
  description: Multi-file HTML site hosting via ZIP or folder upload (up to 5 MB per file, 1000 files per site)
- name: Reports
  description: Abuse reports for published content (public submission endpoint)
- name: Admin
  description: Administrative endpoints protected by the X-Admin-Password header
paths:
  /api/kv/{ns}/{id}/{key}:
    get:
      tags:
      - KV
      summary: Get key value
      description: Returns the value and last update timestamp for a specific key
      operationId: getKey
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: key
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password via header
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password via query param (alternative to X-Password header)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Key value
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvGetResponse'
        '403':
          description: Wrong password
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvGetResponse'
        '404':
          description: Store or key not found
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvGetResponse'
    put:
      tags:
      - KV
      summary: Upsert key
      description: Creates or updates a key in the store; max 1000 keys per store
      operationId: upsertKey
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: key
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KvUpsertKeyRequest'
        required: true
      responses:
        '200':
          description: Key upserted
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvUpsertKeyResponse'
        '403':
          description: Missing or wrong owner token
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvUpsertKeyResponse'
        '404':
          description: Store not found or expired
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvUpsertKeyResponse'
        '409':
          description: Key limit exceeded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvUpsertKeyResponse'
    delete:
      tags:
      - KV
      summary: Delete key
      description: Removes a single key from the store; deleting the last key does not remove the store
      operationId: deleteKey
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: key
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Key deleted
        '403':
          description: Missing or wrong owner token
        '404':
          description: Store or key not found
  /api/json/{ns}/{id}:
    get:
      tags:
      - JSON
      summary: Get JSON document
      description: Returns raw JSON content with application/json content type
      operationId: getById
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password via header
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password via query param (alternative to X-Password header)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: JSON content
          content:
            '*/*':
              schema:
                type: string
        '403':
          description: Wrong password
          content:
            '*/*':
              schema:
                type: string
        '404':
          description: Document not found or expired
          content:
            '*/*':
              schema:
                type: string
    put:
      tags:
      - JSON
      summary: Update JSON document
      description: Replaces document content; requires the owner token returned at creation
      operationId: update
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '200':
          description: Document updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonUpdateResponse'
        '403':
          description: Missing or wrong owner token
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonUpdateResponse'
        '404':
          description: Document not found or expired
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonUpdateResponse'
    delete:
      tags:
      - JSON
      summary: Delete JSON document
      description: Permanently removes the document
      operationId: delete
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Document deleted
        '403':
          description: Missing or wrong owner token
        '404':
          description: Document not found or expired
  /api/html/{ns}/{id}:
    get:
      tags:
      - HTML
      summary: Get HTML page
      description: Returns rendered HTML content; password-protected pages require X-Password header or ?p= query param
      operationId: getById_1
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password via header
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password via query param (alternative to X-Password header)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: HTML content
          content:
            '*/*':
              schema:
                type: string
        '403':
          description: Wrong password
          content:
            '*/*':
              schema:
                type: string
        '404':
          description: Page not found or expired
          content:
            '*/*':
              schema:
                type: string
    put:
      tags:
      - HTML
      summary: Update HTML page
      description: Replaces page content; requires the owner token returned at creation
      operationId: update_1
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HtmlUpdateRequest'
        required: true
      responses:
        '200':
          description: Page updated
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HtmlUpdateResponse'
        '403':
          description: Missing or wrong owner token
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HtmlUpdateResponse'
        '404':
          description: Page not found or expired
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HtmlUpdateResponse'
    delete:
      tags:
      - HTML
      summary: Delete HTML page
      description: Permanently removes page and frees the short URL
      operationId: delete_1
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Page deleted
        '403':
          description: Missing or wrong owner token
        '404':
          description: Page not found or expired
  /api/kv:
    get:
      tags:
      - KV
      summary: List KV stores
      description: Returns all KV stores owned by the given token in the namespace. Returns empty list without token
      operationId: listStores
      parameters:
      - name: ns
        in: query
        description: Namespace
        required: false
        schema:
          type: string
          default: public
      - name: X-Owner-Token
        in: header
        description: Owner token to filter by ownership. Without token returns empty list
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Store list
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/KvStoreListResponse'
    post:
      tags:
      - KV
      summary: Create KV store
      description: Creates a new store with an initial key-value pair and returns a shareable link. Reuse existing owner token
        to group entities under one owner
      operationId: createStore
      parameters:
      - name: ns
        in: query
        description: 'Namespace. Default: public. All namespaces are PUBLIC and indexable. Pages in ''public'' without
          password appear in gallery. Custom namespace is created automatically. Format: [a-z0-9-]{3,32}. On ns+id
          collision the server returns 409 Conflict — retry with a different id or omit id to let the server generate one'
        required: false
        schema:
          type: string
          default: public
          pattern: '^[a-z0-9-]{3,32}$'
      - name: tags
        in: query
        description: Comma-separated tags
        required: false
        schema:
          type: string
      - name: ttl
        in: query
        description: Time to live in days (1-30, default 15, max 30). Store auto-deletes after expiry
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 30
          default: 15
      - name: X-Password
        in: header
        description: Access password. Empty = public store visible in gallery. With password = hidden from gallery, viewers
          must enter password or pass ?p= in URL
        required: false
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Reuse existing owner token to group entities under one owner. If omitted, a new token is generated
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/KvCreateStoreRequest'
        required: true
      responses:
        '201':
          description: Store created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvCreateStoreResponse'
        '400':
          description: Invalid request parameters
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvCreateStoreResponse'
        '429':
          description: Rate limit exceeded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvCreateStoreResponse'
  /api/json:
    get:
      tags:
      - JSON
      summary: List JSON documents
      description: Returns documents owned by the given token. Empty list without token
      operationId: list
      parameters:
      - name: ns
        in: query
        description: Namespace
        required: false
        schema:
          type: string
          default: public
      - name: X-Owner-Token
        in: header
        description: Owner token to filter by ownership. Without token returns empty list
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Document list
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JsonListResponse'
    post:
      tags:
      - JSON
      summary: Create JSON document
      description: Stores any valid JSON and returns a shareable link. Reuse existing owner token to group entities under
        one owner
      operationId: create
      parameters:
      - name: ns
        in: query
        description: 'Namespace. Default: public. All namespaces are PUBLIC and indexable. Pages in ''public'' without
          password appear in gallery. Custom namespace is created automatically. Format: [a-z0-9-]{3,32}. On ns+id
          collision the server returns 409 Conflict — retry with a different id or omit id to let the server generate one'
        required: false
        schema:
          type: string
          default: public
          pattern: '^[a-z0-9-]{3,32}$'
      - name: tags
        in: query
        description: Comma-separated tags
        required: false
        schema:
          type: string
      - name: ttl
        in: query
        description: Time to live in days (1-30, default 15, max 30). Document auto-deletes after expiry
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 30
          default: 15
      - name: X-Password
        in: header
        description: Access password. Empty = public document visible in gallery. With password = hidden from gallery, viewers
          must enter password or pass ?p= in URL
        required: false
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Reuse existing owner token to group entities under one owner. If omitted, a new token is generated
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: string
        required: true
      responses:
        '201':
          description: Document created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonCreateResponse'
        '400':
          description: Invalid JSON or request parameters
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonCreateResponse'
        '429':
          description: Rate limit exceeded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/JsonCreateResponse'
  /api/html:
    post:
      tags:
      - HTML
      summary: Create HTML page
      description: Stores HTML or markdown content and returns a shareable link. Reuse existing owner token to group entities
        under one owner
      operationId: create_1
      parameters:
      - name: ns
        in: query
        description: 'Namespace. Default: public. All namespaces are PUBLIC and indexable. Pages in ''public'' without
          password appear in gallery. Custom namespace is created automatically. Format: [a-z0-9-]{3,32}. On ns+id
          collision the server returns 409 Conflict — retry with a different id or omit id to let the server generate one'
        required: false
        schema:
          type: string
          default: public
          pattern: '^[a-z0-9-]{3,32}$'
      - name: tags
        in: query
        description: Comma-separated tags
        required: false
        schema:
          type: string
      - name: ttl
        in: query
        description: Time to live in days (1-30, default 15, max 30). Page auto-deletes after expiry
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 30
          default: 15
      - name: format
        in: query
        description: 'Content format: ''html'' (default), ''markdown'', or ''md''. Markdown is rendered to styled HTML with
          github-markdown-css'
        required: false
        schema:
          type: string
          default: html
      - name: X-Password
        in: header
        description: Access password. Empty = public page visible in gallery. With password = hidden from gallery, viewers
          must enter password or pass ?p= in URL
        required: false
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Reuse existing owner token to group entities under one owner. If omitted, a new token is generated
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HtmlUploadRequest'
        required: true
      responses:
        '201':
          description: Page created
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HtmlUploadResponse'
        '400':
          description: Invalid request parameters
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HtmlUploadResponse'
        '429':
          description: Rate limit exceeded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/HtmlUploadResponse'
  /api/files:
    get:
      tags:
      - Files
      summary: List files
      description: Returns files owned by the given token. Empty list without token
      operationId: list_1
      parameters:
      - name: ns
        in: query
        description: Namespace
        required: false
        schema:
          type: string
          default: public
      - name: X-Owner-Token
        in: header
        description: Owner token to filter by ownership. Without token returns empty list
        required: false
        schema:
          type: string
      responses:
        '200':
          description: File list
          content:
            '*/*':
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FileListResponse'
    post:
      tags:
      - Files
      summary: Upload file
      description: Stores a file via multipart upload and returns a download link. Only safe file types accepted. Reuse existing
        owner token to group entities under one owner
      operationId: upload
      parameters:
      - name: ns
        in: query
        description: 'Namespace. Default: public. All namespaces are PUBLIC and indexable. Pages in ''public'' without
          password appear in gallery. Custom namespace is created automatically. Format: [a-z0-9-]{3,32}. On ns+id
          collision the server returns 409 Conflict — retry with a different id or omit id to let the server generate one'
        required: false
        schema:
          type: string
          default: public
          pattern: '^[a-z0-9-]{3,32}$'
      - name: tags
        in: query
        description: Comma-separated tags
        required: false
        schema:
          type: string
      - name: ttl
        in: query
        description: Time to live in days (1-30, default 15, max 30). File auto-deletes after expiry
        required: false
        schema:
          type: integer
          format: int32
          minimum: 1
          maximum: 30
          default: 15
      - name: X-Password
        in: header
        description: Access password. Empty = public file visible in gallery. With password = hidden from gallery, viewers
          must enter password or pass ?p= in URL
        required: false
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Reuse existing owner token to group entities under one owner. If omitted, a new token is generated
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
              required:
              - file
      responses:
        '201':
          description: File uploaded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid request or file too large
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '415':
          description: Unsupported file type
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '429':
          description: Rate limit exceeded
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
  /{ns}/{id}:
    get:
      tags:
      - Short Links
      summary: Resolve short URL
      description: |
        Resolves a short URL to the underlying resource (HTML, markdown, JSON, KV, file, or site entry).

        Response headers:
        - `X-Views: <integer>` — current view counter for this resource.
        - For file/site responses: `Accept-Ranges: bytes`, `ETag`, and `Cache-Control: public, max-age=3600`.
          Range requests return `206 Partial Content`.
      operationId: resolve
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password for protected resources
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password (query alternative to X-Password header)
        required: false
        schema:
          type: string
      - name: dl
        in: query
        description: Force download as attachment
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          headers:
            X-Views:
              description: Current view counter for the resolved resource
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: 'Present for file/site responses: bytes'
              schema:
                type: string
            ETag:
              description: Entity tag for file/site responses
              schema:
                type: string
            Cache-Control:
              description: 'Present for file/site responses: public, max-age=3600'
              schema:
                type: string
          content:
            '*/*':
              schema:
                type: object
        '206':
          description: Partial Content (Range requests for files/sites)
          headers:
            Content-Range:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '409':
          description: Conflict — ns+id already exists. Retry with a different id or omit id to let the server generate one
  /{ns}/{id}/{sub}:
    get:
      tags:
      - Short Links
      summary: Resolve short URL with sub-path
      description: |
        Resolves a short URL with a sub-path (e.g. entry file within an uploaded site).

        Response headers:
        - `X-Views: <integer>` — current view counter for this resource.
        - For file/site responses: `Accept-Ranges: bytes`, `ETag`, and `Cache-Control: public, max-age=3600`.
          Range requests return `206 Partial Content`.
      operationId: resolveWithSub
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: sub
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password for protected resources
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password (query alternative to X-Password header)
        required: false
        schema:
          type: string
      - name: dl
        in: query
        description: Force download as attachment
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: OK
          headers:
            X-Views:
              description: Current view counter for the resolved resource
              schema:
                type: integer
                format: int64
            Accept-Ranges:
              description: 'Present for file/site responses: bytes'
              schema:
                type: string
            ETag:
              description: Entity tag for file/site responses
              schema:
                type: string
            Cache-Control:
              description: 'Present for file/site responses: public, max-age=3600'
              schema:
                type: string
          content:
            '*/*':
              schema:
                type: object
        '206':
          description: Partial Content (Range requests for files/sites)
          headers:
            Content-Range:
              schema:
                type: string
            Accept-Ranges:
              schema:
                type: string
            ETag:
              schema:
                type: string
          content:
            '*/*':
              schema:
                type: string
                format: binary
  /{key}.txt:
    get:
      tags:
      - SEO
      summary: IndexNow key verification
      description: Serves the IndexNow verification key file for search engine crawlers
      operationId: serveKeyFile
      parameters:
      - name: key
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Key file content
          content:
            text/plain:
              schema:
                type: string
        '404':
          description: Unknown key
          content:
            text/plain:
              schema:
                type: string
  /api/stats:
    get:
      tags:
      - Stats
      summary: Get platform stats
      description: Returns today's and all-time creation/view counts with per-type breakdown
      operationId: getStats
      responses:
        '200':
          description: Platform statistics
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/StatsResponse'
  /api/sitemap.xml:
    get:
      tags:
      - SEO
      summary: Dynamic XML sitemap
      description: Generates sitemap with static pages and all public gallery entries. Caddy should route /sitemap.xml to
        this endpoint
      operationId: sitemap
      responses:
        '200':
          description: Sitemap XML
          content:
            application/xml:
              schema:
                type: string
  /api/kv/{ns}/{id}:
    get:
      tags:
      - KV
      summary: List keys
      description: Returns all key names and total count for a store
      operationId: listKeys
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password via header
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password via query param (alternative to X-Password header)
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Key list
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvListKeysResponse'
        '403':
          description: Wrong password
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvListKeysResponse'
        '404':
          description: Store not found or expired
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/KvListKeysResponse'
  /api/gallery:
    get:
      tags:
      - Gallery
      summary: Browse gallery
      description: Lists public pages (public namespace, no password) with optional case-insensitive search by title/tags
      operationId: getGallery
      parameters:
      - name: q
        in: query
        description: Case-insensitive search by title or tags
        required: false
        schema:
          type: string
      - name: page
        in: query
        description: Page number (1-based)
        required: false
        schema:
          type: integer
          format: int32
          default: 1
      - name: size
        in: query
        description: Items per page (max 100)
        required: false
        schema:
          type: integer
          format: int32
          default: 20
      responses:
        '200':
          description: Paginated gallery items
          content:
            '*/*':
              schema:
                $ref: '#/components/schemas/GalleryResponse'
  /api/files/{ns}/{id}:
    get:
      tags:
      - Files
      summary: Download file
      description: Returns file inline for previewable types (images, PDF, media) or as attachment. Add ?dl=1 to force download.
      operationId: download
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password via header
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password via query param (alternative to X-Password header)
        required: false
        schema:
          type: string
      - name: dl
        in: query
        description: Force download as attachment
        required: false
        schema:
          type: boolean
      responses:
        '200':
          description: File content
          content:
            '*/*':
              schema:
                type: string
                format: byte
        '403':
          description: Wrong password
          content:
            '*/*':
              schema:
                type: string
                format: byte
        '404':
          description: File not found or expired
          content:
            '*/*':
              schema:
                type: string
                format: byte
    delete:
      tags:
      - Files
      summary: Delete file
      description: Permanently removes the file from storage
      operationId: delete_2
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for update and delete
        required: true
        schema:
          type: string
      responses:
        '204':
          description: File deleted
        '403':
          description: Missing or wrong owner token
        '404':
          description: File not found or expired
  /api/sites:
    post:
      tags:
      - Sites
      summary: Upload site
      description: Upload a multi-file HTML site as a ZIP archive or as individual files with paths. Returns a link to the published site
      operationId: uploadSite
      parameters:
      - name: ns
        in: query
        description: 'Namespace. Default: public'
        required: false
        schema:
          type: string
          default: public
      - name: tags
        in: query
        description: Comma-separated tags
        required: false
        schema:
          type: string
      - name: ttl
        in: query
        description: Time to live in days (1-30, default 15, max 30). Site auto-deletes after expiry
        required: false
        schema:
          type: integer
          minimum: 1
          maximum: 30
          default: 15
      - name: entry
        in: query
        description: 'Entry file path override (default: auto-detect index.html)'
        required: false
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password
        required: false
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Reuse existing owner token to group entities under one owner
        required: false
        schema:
          type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                archive:
                  type: string
                  format: binary
                  description: ZIP archive containing site files
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                  description: Individual files (alternative to archive)
                paths:
                  type: array
                  items:
                    type: string
                  description: Relative paths for each file (must match files order)
      responses:
        '201':
          description: Site uploaded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteUploadResponse'
        '400':
          description: Invalid request, no HTML files, or limits exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '415':
          description: Unsupported file type in archive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sites/{ns}/{id}:
    get:
      tags:
      - Sites
      summary: Get site info
      description: Returns site metadata and file list. Requires owner token
      operationId: getSiteInfo
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Site info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SiteInfoResponse'
        '403':
          description: Missing or wrong owner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Site not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      tags:
      - Sites
      summary: Delete site
      description: Permanently removes the site and all its files from storage
      operationId: deleteSite
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: X-Owner-Token
        in: header
        description: Owner token returned at creation. Required for delete
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Site deleted
        '403':
          description: Missing or wrong owner token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Site not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sites/{ns}/{id}/files/{filePath}:
    get:
      tags:
      - Sites
      summary: Serve site file
      description: Serves an individual file from the site with correct content type
      operationId: serveSiteFile
      parameters:
      - name: ns
        in: path
        required: true
        schema:
          type: string
      - name: id
        in: path
        required: true
        schema:
          type: string
      - name: filePath
        in: path
        required: true
        description: 'Relative file path within the site. May contain slashes for nested paths, e.g.: assets/css/main.css'
        schema:
          type: string
      - name: X-Password
        in: header
        description: Access password via header
        required: false
        schema:
          type: string
      - name: p
        in: query
        description: Access password via query param
        required: false
        schema:
          type: string
      responses:
        '200':
          description: File content
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '403':
          description: Wrong password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Site or file not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/reports:
    post:
      tags:
      - Reports
      summary: Submit abuse report
      description: Submit a report about content hosted on brewpage.app or brewdata.app. Public endpoint, rate-limited
        (60/hr/IP). The server records the reporter's IP (from X-Forwarded-For) and User-Agent automatically
      operationId: submitReport
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportRequest'
        required: true
      responses:
        '201':
          description: Report accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        '400':
          description: Validation failure (invalid URL, unknown category, description out of range, malformed email)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '429':
          description: Rate limit exceeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/reports:
    get:
      tags:
      - Admin
      summary: List abuse reports
      description: List abuse reports with optional status filtering and pagination. Requires admin password
      operationId: listReports
      parameters:
      - name: X-Admin-Password
        in: header
        description: Admin password
        required: true
        schema:
          type: string
      - name: status
        in: query
        description: Filter by report status
        required: false
        schema:
          type: string
          enum:
          - new
          - reviewed
          - dismissed
          - actioned
      - name: limit
        in: query
        description: Maximum number of reports to return
        required: false
        schema:
          type: integer
          format: int32
          default: 50
      - name: offset
        in: query
        description: Offset into the result set for pagination
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          description: Reports list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ReportSummary'
        '401':
          description: Missing or wrong admin password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/reports/{id}:
    get:
      tags:
      - Admin
      summary: Get abuse report
      description: Fetch the full details of a single abuse report, including reporter metadata and reviewer note. Requires
        admin password
      operationId: getReport
      parameters:
      - name: id
        in: path
        description: 10-character alphanumeric report ID
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z0-9]{10}$'
      - name: X-Admin-Password
        in: header
        description: Admin password
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetail'
        '401':
          description: Missing or wrong admin password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    patch:
      tags:
      - Admin
      summary: Update abuse report
      description: Update the status and reviewer note of a report. Requires admin password
      operationId: updateReport
      parameters:
      - name: id
        in: path
        description: 10-character alphanumeric report ID
        required: true
        schema:
          type: string
          pattern: '^[A-Za-z0-9]{10}$'
      - name: X-Admin-Password
        in: header
        description: Admin password
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdateRequest'
        required: true
      responses:
        '200':
          description: Updated report detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportDetail'
        '400':
          description: Invalid status value
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or wrong admin password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Report not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/access:
    get:
      tags:
      - Admin
      summary: List access log events
      description: |
        List recent HTTP access events persisted into `access_events`. Every external request is logged with
        IP, User-Agent, method, path, status, and latency. Retention is 30 days (nightly cleanup job).
        Requires admin password.

        Filters are mutually exclusive and applied in priority order: `resource` > `ip` > (none, returns most recent).
      operationId: listAccess
      parameters:
      - name: X-Admin-Password
        in: header
        description: Admin password
        required: true
        schema:
          type: string
      - name: resource
        in: query
        description: Filter events by resource ID (e.g. a 10-character short ID). Takes priority over `ip`
        required: false
        schema:
          type: string
      - name: ip
        in: query
        description: Filter events by client IP address. Ignored if `resource` is also provided
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Maximum number of events to return
        required: false
        schema:
          type: integer
          format: int32
          default: 100
      - name: offset
        in: query
        description: Offset into the result set for pagination
        required: false
        schema:
          type: integer
          format: int32
          default: 0
      responses:
        '200':
          description: Access events list, most recent first
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AccessEventSummary'
        '401':
          description: Missing or wrong admin password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/admin/access/stats:
    get:
      tags:
      - Admin
      summary: Aggregated access log stats
      description: |
        Aggregated statistics over the access log for the last `days` days, including totals, unique IPs,
        top paths / IPs / user-agents / referers, and a request-count distribution over the 24 hours of day.
        Requires admin password.
      operationId: accessStats
      parameters:
      - name: X-Admin-Password
        in: header
        description: Admin password
        required: true
        schema:
          type: string
      - name: days
        in: query
        description: Number of days to look back from now
        required: false
        schema:
          type: integer
          format: int32
          default: 7
      responses:
        '200':
          description: Aggregated access stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessStats'
        '401':
          description: Missing or wrong admin password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    KvUpsertKeyRequest:
      type: object
      properties:
        value:
          type: string
          description: New value for the key (max 1 MB)
    KvUpsertKeyResponse:
      type: object
      properties:
        id:
          type: string
        namespace:
          type: string
        key:
          type: string
        sizeBytes:
          type: integer
          format: int64
        link:
          type: string
          description: Public short URL for this key
        ownerLink:
          type: string
          description: API URL for programmatic access
    JsonUpdateResponse:
      type: object
      properties:
        id:
          type: string
        namespace:
          type: string
        link:
          type: string
          description: Public short URL for browser viewing
        ownerLink:
          type: string
          description: API URL for programmatic access
        sizeBytes:
          type: integer
          format: int64
        updatedAt:
          type: string
          format: date-time
    HtmlUpdateRequest:
      type: object
      properties:
        content:
          type: string
          description: New HTML content to replace existing page
    HtmlUpdateResponse:
      type: object
      properties:
        id:
          type: string
        namespace:
          type: string
        link:
          type: string
          description: Public short URL for browser viewing
        ownerLink:
          type: string
          description: API URL for programmatic access
        expiresAt:
          type: string
          format: date-time
        sizeBytes:
          type: integer
          format: int64
    KvCreateStoreRequest:
      type: object
      properties:
        key:
          type: string
          description: Initial key name
        value:
          type: string
          description: Value for the initial key (max 1 MB)
    KvCreateStoreResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique 10-character alphanumeric store ID
        namespace:
          type: string
        key:
          type: string
        sizeBytes:
          type: integer
          format: int64
        link:
          type: string
          description: Public short URL for the initial key
        ownerLink:
          type: string
          description: API URL for programmatic access (upsert/delete)
        expiresAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        ownerToken:
          type: string
          description: Secret token required for upsert and delete operations. Store it safely -- cannot be recovered
    JsonCreateResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique 10-character alphanumeric document ID
        namespace:
          type: string
        link:
          type: string
          description: Public short URL for browser viewing
        ownerLink:
          type: string
          description: API URL for programmatic access (update/delete)
        sizeBytes:
          type: integer
          format: int64
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        ownerToken:
          type: string
          description: Secret token required for update and delete operations. Store it safely -- cannot be recovered
    HtmlUploadRequest:
      type: object
      properties:
        content:
          type: string
          description: HTML or markdown content to publish
    HtmlUploadResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique 10-character alphanumeric page ID
        namespace:
          type: string
        link:
          type: string
          description: Public short URL for browser viewing
        ownerLink:
          type: string
          description: API URL for programmatic access (update/delete)
        expiresAt:
          type: string
          format: date-time
        sizeBytes:
          type: integer
          format: int64
        tags:
          type: array
          items:
            type: string
        ownerToken:
          type: string
          description: Secret token required for update and delete operations. Store it safely -- cannot be recovered
    FileUploadResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique 10-character alphanumeric file ID
        namespace:
          type: string
        filename:
          type: string
          description: Original filename as uploaded
        contentType:
          type: string
          description: Detected MIME type (e.g. image/png)
        sizeBytes:
          type: integer
          format: int64
        link:
          type: string
          description: Public short URL for browser download
        ownerLink:
          type: string
          description: API URL for programmatic access (delete)
        expiresAt:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
        ownerToken:
          type: string
          description: Secret token required for delete operation. Store it safely -- cannot be recovered
    StatsResponse:
      type: object
      properties:
        createdToday:
          type: integer
          format: int64
          description: Resources created in the last 24 hours
        totalCreated:
          type: integer
          format: int64
          description: All-time resource count
        viewsToday:
          type: integer
          format: int64
          description: Views in the last 24 hours
        totalViews:
          type: integer
          format: int64
          description: All-time view count
        breakdown:
          type: array
          description: Per-type breakdown (html, json, kv, file)
          items:
            $ref: '#/components/schemas/TypeBreakdown'
    TypeBreakdown:
      type: object
      properties:
        type:
          type: string
          description: 'Resource type: html, json, kv, or file'
        today:
          type: integer
          format: int64
          description: Created in the last 24 hours
        total:
          type: integer
          format: int64
          description: All-time count
    KvStoreListResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique 10-character alphanumeric store ID
        keyCount:
          type: integer
